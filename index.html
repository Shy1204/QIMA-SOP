<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f4f0;padding:20px;color:#2C2C2A}
.w{max-width:900px;margin:0 auto;padding:14px 0}
h1{font-size:18px;font-weight:500;color:#2C2C2A;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid #D3D1C7}

.pb{flex:1;min-width:74px;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 4px;border-radius:8px;border:1px solid #D3D1C7;background:#F1EFE8;cursor:pointer;text-align:center;transition:border-color .15s,background .15s}
.pb:hover{border-color:#B4B2A9}.pb.on{background:#fff;border-color:#888780}
.pdot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.pn{font-size:10px;color:#888780}
.pl{font-size:10px;font-weight:500;color:#2C2C2A;line-height:1.3;word-break:break-word;width:100%}
.panel{display:none}.panel.on{display:block}
.pwrap{border:1px solid #D3D1C7;border-radius:12px;padding:16px 16px 20px;background:#F1EFE8;margin-bottom:12px}
.phdr{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid #D3D1C7}
.ptitle{font-size:14px;font-weight:500;color:#2C2C2A}
.praci{font-size:11px;color:#5F5E5A;margin-left:auto;text-align:right}
.slab{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;background:#FAEEDA;color:#633806;border:1px solid #EF9F27;margin-bottom:12px}
.flow{display:flex;flex-direction:column;align-items:center}
.fbox{background:#fff;border:1px solid #D3D1C7;border-radius:8px;padding:8px 12px;text-align:center;min-width:120px;max-width:200px}
.frole{font-size:9px;font-weight:500;color:#888780;text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px}
.flabel{font-size:12px;font-weight:500;color:#2C2C2A;line-height:1.4}
.fsub{font-size:10px;color:#888780;margin-top:2px;line-height:1.3}
.finfo{background:#E6F1FB;border:1px solid #85B7EB;border-radius:8px;padding:8px 12px;text-align:center;min-width:120px;max-width:200px}
.finfo .frole{color:#0C447C;opacity:.8}.finfo .flabel{color:#0C447C}.finfo .fsub{color:#0C447C;opacity:.7}
.farrow{width:2px;height:14px;background:#888780;margin:0 auto;position:relative;flex-shrink:0}
.farrow::after{content:'';position:absolute;bottom:-6px;left:-5px;border-left:6px solid transparent;border-right:6px solid transparent;border-top:7px solid #888780}
.fmile{background:#EAF3DE;border:1px solid #97C459;border-radius:20px;padding:7px 18px;text-align:center;max-width:320px}
.fmile-txt{font-size:11px;font-weight:500;color:#27500A}
.rtable{width:100%;border-collapse:collapse;margin-top:16px;font-size:11px}
.rtable th{padding:7px 10px;text-align:left;font-weight:500;font-size:10px;text-transform:uppercase;letter-spacing:.06em;border-bottom:2px solid #D3D1C7;color:#5F5E5A;background:#fff}
.rtable td{padding:7px 10px;border-bottom:1px solid #D3D1C7;vertical-align:top;color:#2C2C2A;line-height:1.5;background:#fff}
.rtable tr:last-child td{border-bottom:none}
.rtable .step-col{font-weight:500;color:#2C2C2A;width:28%}
.rtable .r-pill{display:inline-block;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:500;margin:1px 2px 1px 0;white-space:nowrap}
.r-r{background:#E6F1FB;color:#0C447C;border:1px solid #85B7EB}
.r-a{background:#FAEEDA;color:#633806;border:1px solid #EF9F27}
.r-s{background:#F3EAFB;color:#5B2D8E;border:1px solid #C49EE0}
.r-c{background:#EAF3DE;color:#27500A;border:1px solid #97C459}
.r-i{background:#F1EFE8;color:#444441;border:1px solid #D3D1C7}
.raci-legend{display:flex;gap:10px;flex-wrap:wrap;padding:10px 0 6px;border-top:1px solid #D3D1C7;margin-top:4px}
.rleg{display:flex;align-items:center;gap:5px;font-size:10px;color:#5F5E5A}
.rdivider{height:1px;background:#D3D1C7;margin:14px 0 8px}
.rsec-title{font-size:10px;font-weight:500;color:#5F5E5A;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}

<style>
#gate{position:fixed;inset:0;background:#f5f4f0;display:flex;align-items:center;justify-content:center;z-index:9999;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
#gate-box{background:#fff;border:1px solid #D3D1C7;border-radius:12px;padding:32px 36px;width:320px;text-align:center}
#gate-logo{font-size:22px;font-weight:500;color:#2C2C2A;margin-bottom:6px}
#gate-sub{font-size:12px;color:#888780;margin-bottom:24px}
#gate-input{width:100%;padding:10px 14px;border:1px solid #D3D1C7;border-radius:8px;font-size:13px;color:#2C2C2A;outline:none;margin-bottom:10px;box-sizing:border-box}
#gate-input:focus{border-color:#888780}
#gate-btn{width:100%;padding:10px;background:#2C2C2A;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer}
#gate-btn:hover{background:#444441}
#gate-err{font-size:11px;color:#A32D2D;margin-top:8px;display:none}
#main-content{display:none}
</style>
<div id="gate">
  <div id="gate-box">
    <div id="gate-logo">QIMA Audit Ops</div>
    <div id="gate-sub">Internal documentation — authorized access only</div>
    <input id="gate-input" type="password" placeholder="Enter password" onkeydown="if(event.key==='Enter')unlock()">
    <button id="gate-btn" onclick="unlock()">Access</button>
    <div id="gate-err">Incorrect password. Please try again.</div>
  </div>
</div>
<script>
function sha256(str){
  const buf=new TextEncoder().encode(str);
  return crypto.subtle.digest('SHA-256',buf).then(b=>Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join(''));
}
const HASH='f622d5ed9cf1f60444c1c686b45354b7dfffb4ce39aece819487ee3bf5dbedd2';
const KEY='qima_auth';
document.addEventListener('DOMContentLoaded',function(){
  if(sessionStorage.getItem(KEY)===HASH){
    document.getElementById('gate').style.display='none';
    document.getElementById('main-content').style.display='block';
  }
});
function unlock(){
  const val=document.getElementById('gate-input').value;
  sha256(val).then(h=>{
    if(h===HASH){
      sessionStorage.setItem(KEY,HASH);
      document.getElementById('gate').style.display='none';
      document.getElementById('main-content').style.display='block';
    } else {
      document.getElementById('gate-err').style.display='block';
      document.getElementById('gate-input').value='';
      document.getElementById('gate-input').focus();
    }
  });
}
</script>
<div id="main-content">
<div class="w">
<h1>Audit Execution SOP — Non-KA</h1>

<div style="background:#fff;border:1px solid #D3D1C7;border-radius:12px;padding:14px 18px;margin-top:12px">

    <div style="display:flex;align-items:center;gap:7px;font-size:12px;color:#2C2C2A"><span style="display:inline-block;padding:2px 9px;border-radius:10px;font-size:11px;font-weight:500;background:#FAEEDA;color:#633806;border:1px solid #EF9F27">A</span> Accountable — owns the outcome</div>

    <div style="display:flex;align-items:center;gap:7px;font-size:12px;color:#2C2C2A"><span style="display:inline-block;padding:2px 9px;border-radius:10px;font-size:11px;font-weight:500;background:#EAF3DE;color:#27500A;border:1px solid #97C459">C</span> Consulted — input required</div>

</div>

<script>
const A=()=>`<div class="farrow"></div>`;
const B=(r,l,s='',ac='')=>`<div class="fbox"${ac?` style="border-left:3px solid ${ac}"`:''} ><div class="frole">${r}</div><div class="flabel">${l}</div>${s?`<div class="fsub">${s}</div>`:''}</div>`;

const badge=l=>`<div style="font-size:11px;font-weight:500;color:#444441;text-align:center;margin-bottom:8px;padding:2px 10px;background:#D3D1C7;border-radius:20px;border:1px solid #B4B2A9">${l}</div>`;
const BP=(l1,c1,l2,c2)=>`<div style="width:100%;border:1px solid #B4B2A9;border-radius:10px;padding:10px 8px 4px;background:#F1EFE8;margin:2px 0"><div style="display:flex;gap:0;align-items:flex-start"><div style="flex:1;border-right:1px dashed #B4B2A9;padding-right:6px;display:flex;flex-direction:column;align-items:center">${badge(l1)}${c1}</div><div style="flex:1;padding-left:6px;display:flex;flex-direction:column;align-items:center">${badge(l2)}${c2}</div></div></div>`;
const BP3=(l1,c1,l2,c2,l3,c3)=>`<div style="width:100%;border:1px solid #B4B2A9;border-radius:10px;padding:10px 8px 4px;background:#F1EFE8;margin:2px 0"><div style="display:flex;gap:0;align-items:flex-start"><div style="flex:1;border-right:1px dashed #B4B2A9;padding-right:4px;display:flex;flex-direction:column;align-items:center">${badge(l1)}${c1}</div><div style="flex:1;border-right:1px dashed #B4B2A9;padding:0 4px;display:flex;flex-direction:column;align-items:center">${badge(l2)}${c2}</div><div style="flex:1;padding-left:4px;display:flex;flex-direction:column;align-items:center">${badge(l3)}${c3}</div></div></div>`;

const R=(s,r='',a='',sup='',c='',i='')=>`<tr><td class="step-col">${s}</td><td>${r?`<span class="r-pill r-r">${r}</span>`:''}</td><td>${a?`<span class="r-pill r-a">${a}</span>`:''}</td><td>${sup?`<span class="r-pill r-s">${sup}</span>`:''}</td><td>${c?`<span class="r-pill r-c">${c}</span>`:''}</td><td>${i?`<span class="r-pill r-i">${i}</span>`:''}</td></tr>`;
const RACI=rows=>`<div class="rdivider"></div><div class="rsec-title">RASCI breakdown</div><table class="rtable"><thead><tr><th>Step</th><th>Responsible</th><th>Accountable</th><th>Support</th><th>Consulted</th><th>Informed</th></tr></thead><tbody>${rows}</tbody></table>`;
const ph1=`${B('Technical Team','Check if GI exists in SSO','','#185FA5')}}${A()}${D('GI exists?')}<div style="display:flex;width:100%;gap:8px;align-items:flex-start"><div style="width:120px;flex-shrink:0;display:flex;flex-direction:column;align-items:center"><div style="font-size:10px;color:#5F5E5A;font-weight:500;margin:4px 0">Yes</div><div class="fbox" style="width:100%"><div class="frole">All Teams</div><div class="flabel">Use existing GI in SSO</div></div>${A()}<div style="background:#EAF3DE;border:1px solid #97C459;border-radius:16px;padding:6px 10px;text-align:center;width:100%"><div style="font-size:11px;font-weight:500;color:#27500A">Proceed to factory contact</div></div></div><div style="flex:1;display:flex;flex-direction:column;align-items:center"><div style="font-size:10px;color:#5F5E5A;font-weight:500;margin:4px 0">No — create new</div>${A()}<div style="width:100%;border:1px solid #B4B2A9;border-radius:10px;padding:12px 10px 10px;background:#F1EFE8;margin:2px 0"><div style="font-size:10px;font-weight:500;color:#5F5E5A;text-align:center;margin-bottom:10px;text-transform:uppercase;letter-spacing:.05em">Who drafts the new GI?</div><div style="display:flex;gap:0;align-items:flex-start"><div style="flex:1;border-right:1px dashed #B4B2A9;padding-right:8px;display:flex;flex-direction:column;align-items:center"><div style="font-size:11px;font-weight:500;color:#0C447C;text-align:center;margin-bottom:8px;padding:3px 8px;background:#E6F1FB;border-radius:20px;border:1px solid #85B7EB">MA team</div><div style="position:relative;width:110px;height:44px;margin:2px auto;flex-shrink:0"><svg width="110" height="44" style="position:absolute;inset:0;overflow:visible"><polygon points="55,2 107,22 55,42 3,22" fill="none" stroke="#EF9F27" stroke-width="2"/></svg><div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;color:#2C2C2A;text-align:center;line-height:1.3">GI type?</div></div><div style="display:flex;width:100%;gap:4px;align-items:flex-start;margin-top:6px"><div style="flex:1"><div class="fbox" style="border-left:3px solid #185FA5;min-width:0;width:100%;padding:6px 8px"><div class="frole">Technical Team</div><div class="flabel" style="font-size:11px">Draft GI</div><div class="fsub">Report · Protocol</div></div></div><div style="flex:1"><div class="fbox" style="border-left:3px solid #3B6D11;min-width:0;width:100%;padding:6px 8px"><div class="frole">CSC Team</div><div class="flabel" style="font-size:11px">Draft GI</div><div class="fsub">Coordination · Booking</div></div></div></div>${A()}</div><div style="flex:1;padding-left:8px;display:flex;flex-direction:column;align-items:center"><div style="font-size:11px;font-weight:500;color:#27500A;text-align:center;margin-bottom:8px;padding:3px 8px;background:#EAF3DE;border-radius:20px;border:1px solid #97C459">EA team</div><div class="fbox" style="border-left:3px solid #3B6D11;width:100%;padding:6px 8px"><div class="frole">Technical Team (EA)</div><div class="flabel" style="font-size:11px">Drafts GI for ALL types</div><div class="fsub">Report · Protocol · Auditor · Coordination</div></div><div style="display:flex;align-items:flex-start;width:100%;gap:4px;margin-top:0"><div style="flex:1"></div><div class="farrow" style="margin:0"></div><div style="flex:1.6;border:1.5px dashed #EF9F27;border-radius:6px;padding:5px 6px;background:#FAEEDA;margin-top:2px"><div style="font-size:9px;font-weight:500;color:#633806;text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px">Risk note</div><div style="font-size:10px;color:#633806;line-height:1.4">CSC may update directly for easy requests, skipping back office notification</div></div></div></div></div></div>${A()}${B('Technical Team','Save as PDF and rename','{GI}type-Client-Team-Date')}${A()}<div class="fbox" style="border-left:3px solid #185FA5"><div class="frole">Manager</div><div class="flabel">Review and approve GI</div><div class="fsub">Team leader sign-off required</div></div>${A()}<div class="fbox" style="border-left:3px solid #854F0B"><div class="frole">Technical Team</div><div class="flabel">Send email to Support Team</div><div class="fsub">Attach approved GI PDF</div></div>${A()}${B('Support Team','Upload to SSO and sync to orders','Technical team has no SSO access')}${A()}${N('Support Team','Notify back office of updated GI','Required — must not be skipped')}${A()}${M('GI approved, uploaded and back office notified')}</div></div>`;

const phases=[
{n:1,l:'Order preparation with client',c:'#185FA5',raci:'Technical Team (R) · Manager (A) · Support Team (I)',sla:'',flow:ph1,
raciTable:RACI(

  R('Upload GI to SSO','Support Team','Technical Team Manager','Technical Team','','Back Office') +

{n:2,l:'First contact with factory for data gathering',c:'#854F0B',raci:'Coordination (R)',sla:'Reminders every 3 working days · 4 days max per cycle',
flow:`

`,
raciTable:RACI(

flow:`

const nav=document.getElementById('nav'),panels=document.getElementById('panels');
phases.forEach((p,i)=>{
  const btn=document.createElement('div');
  btn.className='pb'+(i===0?' on':'');
  btn.innerHTML=`<div class="pdot" style="background:${p.c}"></div><div class="pn">Ph ${p.n}</div><div class="pl">${p.l}</div>`;
  btn.onclick=()=>{
    document.querySelectorAll('.pb').forEach(b=>b.classList.remove('on'));
    document.querySelectorAll('.panel').forEach(b=>b.classList.remove('on'));
    btn.classList.add('on');
    document.getElementById('ph'+p.n).classList.add('on');
  };
  nav.appendChild(btn);
  const el=document.createElement('div');
  el.className='panel'+(i===0?' on':'');
  el.id='ph'+p.n;
  el.innerHTML=`<div class="pwrap"><div class="phdr"><div style="width:12px;height:12px;border-radius:50%;background:${p.c};flex-shrink:0"></div><div class="ptitle">Phase ${p.n} — ${p.l.charAt(0).toUpperCase()+p.l.slice(1)}</div><div class="praci">${p.raci}</div></div>${p.sla?`<div class="slab">${p.sla}</div>`:''}<div class="flow">${p.flow}</div>${p.raciTable||''}</div>`;
  panels.appendChild(el);
});
</script>
